# Staging MiniSMS (minisms_test) on production hostname, port 18080.
# Install: cp to /etc/nginx/sites-available/minisms-staging
#          ln -sf .../sites-available/minisms-staging /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
# Backend: minisms-staging.service → 127.0.0.1:18080

server {
    listen 18080 ssl;
    listen [::]:18080 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host:$server_port;
    }
}
