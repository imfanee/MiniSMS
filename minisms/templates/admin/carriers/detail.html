{{define "content"}}
<nav class="text-secondary small mb-2" aria-label="Breadcrumb">
	<a href="/admin/carriers">Carriers</a> / <span class="text-body">{{.Carrier.Name}}</span>
</nav>
<div class="card bg-body-tertiary border mb-4" x-data="{ tab: 'headers' }">
	<div class="card-body">
		<div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
			<div>
				<h2 class="h2 mb-1">{{.Carrier.Name}}</h2>
				{{if eq .Carrier.Status "active"}}
					<span class="badge bg-success">active</span>
				{{else}}
					<span class="badge bg-secondary">inactive</span>
				{{end}}
			</div>
			<div class="text-end">
				<div class="h3 mb-0 font-monospace">{{.BalanceFmt}}</div>
				<div class="text-secondary small text-break" style="max-width: 24rem;">{{.Carrier.EndpointURL}}</div>
			</div>
		</div>
	</div>
	<ul class="nav nav-tabs px-3" role="tablist">
		<li class="nav-item">
			<button class="nav-link" :class="{ 'active': tab === 'headers' }" @click="tab = 'headers'" type="button" hx-get="/admin/carriers/{{.Carrier.CarrierID}}/auth-headers" hx-target="#tab-content" hx-swap="innerHTML">Auth Headers</button>
		</li>
		<li class="nav-item">
			<button class="nav-link" :class="{ 'active': tab === 'template' }" @click="tab = 'template'" type="button" hx-get="/admin/carriers/{{.Carrier.CarrierID}}/template" hx-target="#tab-content" hx-swap="innerHTML">Request Template</button>
		</li>
		<li class="nav-item">
			<button class="nav-link" :class="{ 'active': tab === 'ledger' }" @click="tab = 'ledger'" type="button" hx-get="/admin/carriers/{{.Carrier.CarrierID}}/ledger" hx-target="#tab-content" hx-swap="innerHTML">Ledger</button>
		</li>
		<li class="nav-item">
			<button class="nav-link" :class="{ 'active': tab === 'usage' }" @click="tab = 'usage'" type="button" hx-get="/admin/carriers/{{.Carrier.CarrierID}}/usage" hx-target="#tab-content" hx-swap="innerHTML">Usage</button>
		</li>
		<li class="nav-item">
			<button class="nav-link" :class="{ 'active': tab === 'senderids' }" @click="tab = 'senderids'" type="button" hx-get="/admin/carriers/{{.Carrier.CarrierID}}/sender-ids" hx-target="#tab-content" hx-swap="innerHTML">Sender IDs</button>
		</li>
		<li class="nav-item">
			<button class="nav-link" :class="{ 'active': tab === 'dlr' }" @click="tab = 'dlr'" type="button" hx-get="/admin/carriers/{{.Carrier.CarrierID}}/dlr-settings" hx-target="#tab-content" hx-swap="innerHTML">DLR Settings</button>
		</li>
	</ul>
	<div class="p-3">
		<div id="tab-content" hx-get="/admin/carriers/{{.Carrier.CarrierID}}/auth-headers" hx-trigger="load" hx-target="this" hx-swap="innerHTML"></div>
	</div>
</div>
{{end}}
