{{define "header_row"}}
<tr id="auth-hdr-{{.HeaderID}}">
	<td class="font-monospace text-break" style="max-width: 12rem;">{{.Name}}</td>
	<td class="text-break font-monospace small" style="max-width: 28rem;">{{.Value}}</td>
	<td class="text-nowrap text-end">
		<button type="button" class="btn btn-sm btn-outline-danger" hx-delete="/admin/carriers/{{.CarrierID}}/auth-headers/{{.HeaderID}}" hx-confirm="Delete this header?" hx-target="closest tr" hx-swap="outerHTML">Delete</button>
	</td>
</tr>
{{end}}
