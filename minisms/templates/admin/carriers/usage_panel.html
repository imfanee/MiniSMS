{{define "usage_panel"}}
<div class="d-flex flex-column gap-3">
	<div class="row g-3">
		<div class="col-md-4">
			<div class="card h-100 bg-body border text-center">
				<div class="card-body">
					<div class="text-secondary small">Total messages sent (all time)</div>
					<div class="h3 font-monospace mb-0">{{.TotalMessages}}</div>
				</div>
			</div>
		</div>
		<div class="col-md-4">
			<div class="card h-100 bg-body border text-center">
				<div class="card-body">
					<div class="text-secondary small">Total segments (all time)</div>
					<div class="h3 font-monospace mb-0">{{.TotalSegments}}</div>
				</div>
			</div>
		</div>
		<div class="col-md-4">
			<div class="card h-100 bg-body border text-center">
				<div class="card-body">
					<div class="text-secondary small">Total amount charged (all time)</div>
					<div class="h3 font-monospace mb-0">{{.TotalChargedFmt}}</div>
					<div class="text-secondary small mt-1">Last 30 days: {{.Spend30dFmt}}</div>
					{{if .LastAt}}
					<div class="text-secondary small mt-2" style="font-size:0.8rem">Last message: {{.LastAt}} (UTC)</div>
					{{end}}
				</div>
			</div>
		</div>
	</div>
</div>
{{end}}
