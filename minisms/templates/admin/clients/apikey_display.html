{{define "client_apikey_display"}}
<div class="alert alert-success">
	<div class="mb-1"><strong>New API key generated</strong></div>
	<div class="font-monospace small text-break mb-2" id="full-api-key">{{.RawKey}}</div>
	<div class="d-flex gap-2 align-items-center">
		<button class="btn btn-sm btn-outline-success" type="button" onclick="navigator.clipboard && navigator.clipboard.writeText(document.getElementById('full-api-key').textContent)">Copy</button>
		<span class="small text-danger">Copy this key now — it will never be shown again.</span>
	</div>
	<div class="mt-3">
		<button class="btn btn-sm btn-primary" type="button" hx-get="/admin/clients/{{.ClientID}}/api-key" hx-target="#apikey-panel" hx-swap="outerHTML">Done</button>
	</div>
</div>
{{end}}
