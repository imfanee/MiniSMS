{{define "content"}}
<div class="d-flex justify-content-between align-items-center mb-4">
	<h1 class="h2 mb-0">Clients</h1>
	<button type="button" class="btn btn-primary" hx-get="/admin/clients/new" hx-target="#client-table-body" hx-swap="afterbegin">+ Add Client</button>
</div>
{{if not .HasRows}}
<div class="text-center text-secondary py-5">No clients configured yet.</div>
{{end}}
<div class="table-responsive">
	<table class="table table-dark table-hover align-middle">
		<thead><tr><th>Name</th><th>Email</th><th>Status</th><th class="text-end">Balance</th><th>Rate Group</th><th>Routing Group</th><th>API Key</th><th>Actions</th></tr></thead>
		<tbody id="client-table-body">{{range .Rows}}{{template "client_row" .}}{{end}}</tbody>
	</table>
</div>
{{end}}
