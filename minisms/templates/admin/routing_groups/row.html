{{define "rog_row"}}
<tr id="rog-row-{{.RoutingGroupID}}">
	<td>{{.Name}}</td>
	<td>{{if eq .Status "active"}}<span class="badge bg-success">active</span>{{else}}<span class="badge bg-secondary">inactive</span>{{end}}</td>
	<td>{{.TotalRoutes}}</td>
	<td>{{.ActiveRoutes}}</td>
	<td>{{if gt .HasFailoverCount 0}}Yes{{else}}No{{end}}</td>
	<td>{{.AssignedClientCount}}</td>
	<td class="d-flex gap-1 flex-wrap">
		<a class="btn btn-sm btn-outline-light" href="/admin/routing-groups/{{.RoutingGroupID}}">Routing Rules</a>
		<button type="button" class="btn btn-sm btn-outline-primary" hx-get="/admin/routing-groups/{{.RoutingGroupID}}/edit" hx-target="closest tr" hx-swap="outerHTML">Edit</button>
		<button type="button" class="btn btn-sm {{if eq .Status "active"}}btn-outline-warning{{else}}btn-outline-success{{end}}" hx-post="/admin/routing-groups/{{.RoutingGroupID}}/toggle-status" hx-target="closest tr" hx-swap="outerHTML">{{if eq .Status "active"}}Deactivate{{else}}Activate{{end}}</button>
	</td>
</tr>
{{end}}
